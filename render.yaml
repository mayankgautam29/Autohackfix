# Render Blueprint — OPENAI_API_KEY must still be set as a secret in the dashboard.
# CORS includes the live Vercel app + local dev.

services:
  - type: web
    name: autohackfix-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: CORS_ORIGINS
        value: https://autohackfix.vercel.app,http://localhost:3000,http://127.0.0.1:3000

  - type: web
    name: autohackfix-web
    runtime: docker
    rootDir: .
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://autohackfix.onrender.com
