# Render Blueprint — create two Web Services from this repo, or adjust names/URLs.
# Set secrets in the dashboard: OPENAI_API_KEY, CORS_ORIGINS (your frontend origin).

services:
  - type: web
    name: autohackfix-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: CORS_ORIGINS
        sync: false

  # Frontend: set NEXT_PUBLIC_API_URL to your *public* API URL. On Render, mark it
  # available at build time so Next.js can inline it (Dashboard → Env → “build time”).
  - type: web
    name: autohackfix-web
    runtime: docker
    rootDir: .
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
